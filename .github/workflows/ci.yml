name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PitLife.sln

      - name: Build
        run: dotnet build PitLife.sln --no-restore

      - name: Test
        run: dotnet test PitLife.sln --no-build --verbosity normal